services:

  # ── Express API server ───────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lynx-auth-server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      # Override these here if you want to avoid editing .env
      PORT: 4000
      CLIENT_URL: http://localhost:3000
      CALLBACK_BASE_URL: http://localhost:4000
      # n8n is running on the host machine — this hostname resolves to the host from inside a container
      N8N_BASE_URL: http://host.docker.internal:5678
    ports:
      - "4000:4000"
    volumes:
      # SQLite database persists across container restarts
      - server-data:/app/data
    extra_hosts:
      # Allows the container to reach services on the host (n8n, Ollama, etc.)
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── React frontend (built + served via nginx) ────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: lynx-auth-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  # Named volume so the SQLite DB survives `docker compose down`
  server-data:
