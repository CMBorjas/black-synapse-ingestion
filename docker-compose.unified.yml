name: black-synapse

# ─────────────────────────────────────────────────────────────────────────────
# Unified Black Synapse stack
#
# Starts all services with one command:
#   docker compose up -d
#
# First-time setup:
#   1. Fill in black-synapse-app/.env (copy from lynx-auth-app/.env.example)
#   2. Fill in black-synapse-ingestion/.env (copy from .env.example)
#   3. Run: docker compose up -d
#   4. Create your first user account (see README.md)
#
# To stop:             docker compose down
# To stop + wipe data: docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ulimits:
      nofile: 262144

  # ── Ollama (LLM) ────────────────────────────────────────────────────────────

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama-init:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
      - ./black-synapse-ingestion/ollama/init-models.sh:/init-models.sh
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: ["/bin/bash", "/init-models.sh"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  # ── n8n (workflow automation) ────────────────────────────────────────────────
  # N8N_HOST is set to 0.0.0.0 (listen on all interfaces) so that other
  # containers (lynx-server) can reach n8n by service name over the Docker
  # network. The original ingestion compose used 127.0.0.1 which only works
  # for host-side access and breaks container-to-container calls.

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-CHANGE_ME_LONG_RANDOM}
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_RUNNERS_ENABLED=true
      - DB_SQLITE_POOL_SIZE=5
      - N8N_HOST=0.0.0.0
      - N8N_PROTOCOL=http
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - EXECUTIONS_TIMEOUT=180
      - EXECUTIONS_TIMEOUT_MAX=600
      - 'NODES_EXCLUDE=["n8n-nodes-base.executeCommand"]'
      - N8N_RESTRICT_FILE_ACCESS_TO=/home/node/.n8n-files;/data/asr
    volumes:
      - n8n_data:/home/node/.n8n
      - ./black-synapse-ingestion/ASR:/data/asr
    depends_on:
      - redis
      - qdrant
      - ollama
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  n8n-worker:
    image: n8nio/n8n:latest
    command: worker
    restart: unless-stopped
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-CHANGE_ME_LONG_RANDOM}
      - N8N_EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - N8N_WORKER_CONCURRENCY=1
      - EXECUTIONS_TIMEOUT=180
      - EXECUTIONS_TIMEOUT_MAX=600
      - 'NODES_EXCLUDE=["n8n-nodes-base.executeCommand"]'
      - N8N_RESTRICT_FILE_ACCESS_TO=/home/node/.n8n-files;/data/asr
    volumes:
      - n8n_data:/home/node/.n8n
      - ./black-synapse-ingestion/ASR:/data/asr
    depends_on:
      - redis

  # ── ASR (speech recognition) ─────────────────────────────────────────────────

  asr:
    build:
      context: ./black-synapse-ingestion
      dockerfile: ./ASR/Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - asr_audio:/app/received_audio
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # ── Kokoro TTS ───────────────────────────────────────────────────────────────

  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    ports:
      - "8880:8880"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1

  # ── DeepFace (face recognition) ──────────────────────────────────────────────

  deepface:
    image: serengil/deepface:latest
    platform: linux/amd64
    ports:
      - "5000:5000"
    restart: unless-stopped

  # ── Lynx Auth App — Express server ───────────────────────────────────────────
  # Uses the same n8n instance above. Because this server is inside Docker,
  # N8N_BASE_URL points to the service name "n8n" (not localhost).
  # OAuth callbacks still go through the host (CALLBACK_BASE_URL=localhost:4000).

  lynx-server:
    build:
      context: ./black-synapse-app/lynx-auth-app/server
      dockerfile: Dockerfile
    container_name: lynx-auth-server
    restart: unless-stopped
    env_file:
      - ./black-synapse-app/.env
    environment:
      PORT: 4000
      CLIENT_URL: http://localhost:3000
      CALLBACK_BASE_URL: http://localhost:4000
      # Point to the n8n service in this compose network (not localhost)
      N8N_BASE_URL: http://n8n:5678
      # Webhook URL for the send-email workflow (production path, not webhook-test)
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/send-email
    ports:
      - "4000:4000"
    volumes:
      - lynx_server_data:/app/data
    depends_on:
      n8n:
        condition: service_healthy
    extra_hosts:
      # Allows reaching services on the host machine if needed
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Lynx Auth App — React frontend (nginx) ───────────────────────────────────

  lynx-client:
    build:
      context: ./black-synapse-app/lynx-auth-app/client
      dockerfile: Dockerfile
    container_name: lynx-auth-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      lynx-server:
        condition: service_healthy

# ─────────────────────────────────────────────────────────────────────────────
# NOTE: The FastAPI ingestion worker (port 8000) is intentionally run manually
#       (not in Docker) because it requires GPU access and a Python venv.
#       See black-synapse-ingestion/README.md → "Start the ingestion worker".
#       All AI calls from n8n use host.docker.internal:8000 to reach it.
# ─────────────────────────────────────────────────────────────────────────────

volumes:
  n8n_data:
  qdrant_data:
  ollama_data:
  asr_audio:
  lynx_server_data:
