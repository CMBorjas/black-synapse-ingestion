services:
  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_ENCRYPTION_KEY=CHANGE_ME_LONG_RANDOM
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_RUNNERS_ENABLED=true
      - DB_SQLITE_POOL_SIZE=5
      - N8N_HOST=127.0.0.1
      - N8N_PROTOCOL=http
      - N8N_PORT=5678
      - WEBHOOK_URL=http://127.0.0.1:5678/

      - N8N_EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379

      - EXECUTIONS_TIMEOUT=180
      - EXECUTIONS_TIMEOUT_MAX=600

    volumes:
      - n8n_data:/home/node/.n8n
      - "./ASR:/data/asr"
    depends_on:
      - redis
      - qdrant
      - ollama

  n8n-worker:
    image: n8nio/n8n:latest
    command: worker
    restart: unless-stopped
    environment:
      - N8N_ENCRYPTION_KEY=CHANGE_ME_LONG_RANDOM

      - N8N_EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379

      - N8N_WORKER_CONCURRENCY=1

      - EXECUTIONS_TIMEOUT=180
      - EXECUTIONS_TIMEOUT_MAX=600
    volumes:
      - n8n_data:/home/node/.n8n
      - "./ASR:/data/asr"
    depends_on:
      - redis

  qdrant:
    image: qdrant/qdrant:latest
#    ports:
#      - "6333:6333"
#      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:6333/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ulimits:
      nofile: 262144

  ollama:
    image: ollama/ollama:latest
#    ports:
#      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama-init:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama/init-models.sh:/init-models.sh
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: [ "/bin/bash", "/init-models.sh" ]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  asr:
    build:
      context: .
      dockerfile: ./ASR/Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - asr_audio:/app/received_audio
    environment:
      - PYTHONUNBUFFERED=1

  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    ports:
      - "8880:8880"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    runtime: nvidia

  deepface:
    image: serengil/deepface:latest
    ports:
      - "5000:5000"
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=atlasai
#    ports:
#      - "5433:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    ports:
      - "8009:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/atlasai
      - LOG_LEVEL=INFO
    depends_on:
      - qdrant
      - postgres
    restart: unless-stopped
    volumes:
      - ./worker/app:/app/app:cached
      - ./.env:/app/.env:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  n8n_data:
  qdrant_data:
  ollama_data:
  asr_audio:


